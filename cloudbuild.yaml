steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--network=cloudbuild'
      - '--no-cache'
      - '-t'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/app:$_IMAGE_TAG'
      - '--build-arg'
      - 'NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_CLERK_SIGN_IN_URL=$_NEXT_PUBLIC_CLERK_SIGN_IN_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_CLERK_SIGN_UP_URL=$_NEXT_PUBLIC_CLERK_SIGN_UP_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=$_NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=$_NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=$_NEXT_PUBLIC_SUPABASE_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=$_NEXT_PUBLIC_SUPABASE_ANON_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY'
      - '.'

  # 2. Push the image to Artifact Registry immediately
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/app:$_IMAGE_TAG'

  # 3. Deploy the newly pushed image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/app:$_IMAGE_TAG'
      - '--region'
      - '$_DEPLOY_REGION'

images:
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/app:$_IMAGE_TAG'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _AR_HOSTNAME: 'us-central1-docker.pkg.dev'
  _AR_PROJECT_ID: 'rankshoot'
  _AR_REPOSITORY: 'rankshoot-repo'
  _IMAGE_TAG: 'v1'
  _SERVICE_NAME: 'rankshoot-web'
  _DEPLOY_REGION: 'us-central1'
